apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
        - name: url-shortener
          image: urlshortener-web
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
          env:
            - name: REDIS_HOST
              value: "redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener
spec:
  selector:
    app: url-shortener
  ports:
    - port: 8888
      targetPort: 8888
  type: NodePort